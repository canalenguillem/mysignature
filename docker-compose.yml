version: "3.9"

services:
  # ========== BASES DE DATOS ==========

  mariadb:
    image: mariadb:10.5
    container_name: firma_digital_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_INITDB_SKIP_TZINFO: "yes"
      TZ: "Europe/Madrid"
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backend/app/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - firma-network

  mongodb:
    image: mongo:4.4
    container_name: firma_digital_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      timeout: 10s
      retries: 5
    networks:
      - firma-network

  redis:
    image: redis:6-alpine
    container_name: firma_digital_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
    networks:
      - firma-network
    command: redis-server --appendonly yes

  # ========== BACKEND ==========

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: firma_digital_backend
    environment:
      DEBUG: ${DEBUG}
      DATABASE_URL: mysql+pymysql://${DB_USER}:${DB_PASSWORD}@mariadb:3306/${DB_NAME}
      MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017
      MONGODB_DATABASE: ${MONGO_DATABASE}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      TSA_URL: ${TSA_URL}
      FNMT_ROOT_CA_PEM: /etc/certs/fnmt-root-ca.pem
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./certs/fnmt-root-ca.pem:/etc/certs/fnmt-root-ca.pem:ro
    depends_on:
      mariadb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - firma-network
    # En dev el esquema lo crean init.sql (MariaDB initdb) + init_db() al arrancar.
    # Alembic queda reservado para migraciones de producción.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      timeout: 10s
      retries: 5

  # ========== FRONTEND ==========

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: firma_digital_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    networks:
      - firma-network
    depends_on:
      - backend
    command: npm run dev

  # ========== NGINX REVERSE PROXY ==========

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: firma_digital_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - firma-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      timeout: 10s
      retries: 5

networks:
  firma-network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
